<!DOCTYPE html>
<html lang="PT-BR">
    <head>
        <meta charset = 'utf-8'>
        <meta name="viewport" content="width=device-width, initial-scale = 1.0">
        <title>NetFlix - Exercicio</title>
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            html, body {
                width: 100%;
                height: 100%;
                background-image: url(imgs/hisoka_wallpaper.png);
                background-size: cover;
            }

            #fundo_corpo {
                background-color: rgba(0, 0, 0, 0.356);
                width: 100%;
                height: 100%;
            }

            #head{
                margin: 16px;
                padding: 12px;
                display: flex;
                justify-content: space-between;
            }

            .logo_net {
                margin-left: 16px;
            }

            .logo_flix{
                width: 148px;
                height: 40px;
            }

            .ent_idioma { 
                justify-content: space-between;
                display: flex;
                
            }

            .idioma {
                margin: 4px;
            }

            .entrar {
                margin: 4px;
            }

            .email_vamosla {
                display: flex;
                justify-content: space-between;
            }

            .alinhamento_corpo {
                justify-items: center;
                color: white;
                margin-top: 15%;
                margin-left: auto;
                margin-right: auto;
                text-align: center;
                
                
            
            }

            .alinhamento_corpo h1{
                font-family: sans-serif;
                font-size: 48px;
            }

            .alinhamento_corpo p {
                font-size: large;
                font-size: 25px;
                font-family: sans-serif;
            }


            .descricao {
                width: 100%;
            }

            .coleta_email_vamos_la {
                margin-top: 14px;
                
            }
  
                       

            

        </style>
    </head>
    <body>
        <div id="fundo_corpo">
            <!-- cabeçalho -->
            <div id="head">
                <div class = "logo_net">
                    <img src="imgs/Netflix_2015_logo.svg.png" alt="logo_netflix" class="logo_flix">

                </div>
                <div class="ent_idioma">
                    <div class="idioma">
                        <p>Selecione o idioma</p>
                    </div>
                    <div class="entrar">
                        <p> entrar </p>
                    </div>
                </div>

            </div>
            <!-- corpo -->
            <div>
                <div class="alinhamento_corpo">
                    <div class="descricao">
                        <h1>Filmes, séries e muito mais, sem limites</h1>
                        <p>A partir de R$ 20,90. Cancele quando quiser.</p>
                    </div>
                    <div class="coleta_email_vamos_la">
                        <h3>Quer assistir? Informe seu email para criar ou reiniciar sua assinatura.</h3>
                        <div class="email_vamosla">
                            <div class="email">
                                <p>email</p>

                            </div>
                            <div class="vamosla">
                                <p>vamos la</p>


                            </div>

                        </div>


                    </div>

                </div>

            </div>
        </div>

    </body>


</html>
